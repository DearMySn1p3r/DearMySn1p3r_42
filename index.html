<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>문자 메이커</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html-to-image/1.11.11/html-to-image.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js"></script>
<style>
:root{
  --bg:#faf7f9; --surface:#ffffff; --line:#efe9ed; --field:#f6f2f5;
  --ink:#2c2630; --muted:#928791; --faint:#bcb2ba;
  --accent:#ff5d8f; --accent-soft:#ffe7ef;
  --av-bg:radial-gradient(circle at 35% 30%,#ffd1e2,#ff9ec1);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{font-family:'Pretendard',sans-serif;-webkit-font-smoothing:antialiased;
  background:linear-gradient(180deg,#fbf8fa,#fdf4f8);color:var(--ink);min-height:100%;padding:40px 22px 80px;line-height:1.45;}
.wrap{max-width:1040px;margin:0 auto;}
.head{text-align:center;margin-bottom:34px;}
.head h1{font-size:22px;font-weight:700;letter-spacing:-.4px;}
.head h1 .dot{color:var(--accent);}
.head p{margin-top:6px;font-size:12.5px;color:var(--muted);}

.layout{display:grid;grid-template-columns:360px 1fr;gap:28px;align-items:start;}
@media(max-width:840px){.layout{grid-template-columns:1fr;}}

.panel{background:var(--surface);border:1px solid var(--line);border-radius:24px;padding:6px 22px;box-shadow:0 12px 36px rgba(70,40,55,.05);}
.sec{padding:20px 0;border-bottom:1px solid var(--line);}
.sec:last-child{border-bottom:none;}
.lab{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.2px;margin-bottom:12px;display:flex;align-items:center;}
.lab small{font-weight:400;color:var(--faint);font-size:10.5px;margin-left:auto;}

.seg{display:flex;background:var(--field);border-radius:13px;padding:3px;gap:3px;}
.seg button{flex:1;border:none;background:transparent;cursor:pointer;padding:10px 0;border-radius:11px;font:inherit;font-size:13px;font-weight:600;color:var(--muted);transition:.16s;}
.seg button.on{background:var(--surface);color:var(--ink);box-shadow:0 2px 6px rgba(70,40,55,.1);}

.themes{display:flex;flex-wrap:wrap;gap:10px;}
.sw{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid var(--surface);box-shadow:0 0 0 1px var(--line);transition:.14s;}
.sw:hover{transform:scale(1.15);}
.sw.on{box-shadow:0 0 0 2px var(--accent);transform:scale(1.1);}

.inp{width:100%;border:1px solid var(--line);background:var(--surface);border-radius:12px;padding:11px 13px;font:inherit;font-size:14px;color:var(--ink);outline:none;transition:.16s;}
.inp:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);}
.inp::placeholder{color:var(--faint);}

.parts{display:flex;flex-direction:column;gap:7px;}
.part{display:flex;align-items:center;gap:11px;background:var(--field);border-radius:14px;padding:7px 10px;transition:.16s;}
.part.isme{background:var(--accent-soft);}
.pav{width:38px;height:38px;border-radius:50%;flex-shrink:0;cursor:pointer;background:var(--av-bg);position:relative;display:flex;align-items:center;justify-content:center;}
.pav img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.pav .cam{position:absolute;font-size:13px;opacity:.5;}
.pav img+.cam{display:none;}
.pav .pdel{position:absolute;top:-3px;right:-3px;width:16px;height:16px;border-radius:50%;background:var(--ink);color:#fff;font-size:10px;line-height:1;display:flex;align-items:center;justify-content:center;border:1.5px solid var(--surface);}
.pname{flex:1;font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mebtn{border:1px solid var(--line);background:var(--surface);color:var(--muted);border-radius:999px;padding:6px 14px;font:inherit;font-size:12px;font-weight:600;cursor:pointer;transition:.16s;flex-shrink:0;}
.mebtn.on{background:var(--accent);color:#fff;border-color:var(--accent);}
.empty{font-size:12.5px;color:var(--faint);text-align:center;padding:6px 0;}
.swapbtn{width:100%;margin-top:8px;border:1px solid var(--line);background:var(--surface);color:var(--muted);border-radius:12px;padding:9px 0;font:inherit;font-size:12.5px;font-weight:600;cursor:pointer;transition:.16s;}
.swapbtn:hover{color:var(--accent);border-color:var(--accent-soft);background:var(--field);}

.toggle{display:flex;align-items:center;justify-content:space-between;}
.toggle span{font-size:13px;font-weight:500;}
.sw-toggle{width:44px;height:25px;border-radius:999px;background:#e6dde2;position:relative;cursor:pointer;transition:.2s;flex-shrink:0;}
.sw-toggle::after{content:"";position:absolute;top:3px;left:3px;width:19px;height:19px;border-radius:50%;background:#fff;transition:.2s;box-shadow:0 1px 2px rgba(0,0,0,.15);}
.sw-toggle.on{background:var(--accent);}
.sw-toggle.on::after{left:22px;}

textarea.ooc{width:100%;min-height:200px;resize:vertical;border:1px solid var(--line);background:var(--surface);border-radius:14px;padding:14px;font:inherit;font-size:13px;line-height:1.7;color:var(--ink);outline:none;transition:.16s;}
textarea.ooc:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);}
textarea.ooc::placeholder{color:var(--faint);}
.hint{font-size:11px;color:var(--muted);line-height:1.8;margin-top:11px;}
.hint code{background:var(--field);color:var(--accent);padding:1px 6px;border-radius:6px;font-size:11px;}
.linkbtn{background:none;border:none;color:var(--muted);font:inherit;font-size:12px;cursor:pointer;margin-top:10px;text-decoration:underline;text-underline-offset:2px;}
.linkbtn:hover{color:var(--accent);}

.oocbox{background:var(--field);border:1px solid var(--line);border-radius:13px;padding:12px 13px;font-size:11.5px;line-height:1.7;color:var(--muted);max-height:130px;overflow:auto;white-space:pre-wrap;}
.btn{border:none;cursor:pointer;border-radius:12px;padding:11px 0;font:inherit;font-size:13px;font-weight:600;transition:.16s;}
.copybtn{width:100%;margin-top:10px;background:var(--ink);color:#fff;}
.copybtn:hover{filter:brightness(1.15);}

.stage{position:sticky;top:30px;}
.stage-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;padding:0 2px;gap:10px;}
.stage-bar .ttl{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.2px;margin-right:auto;}
.btn.save{background:var(--accent);color:#fff;padding:10px 18px;box-shadow:0 6px 16px rgba(255,93,143,.28);}
.btn.save:hover{transform:translateY(-1px);}
.btn.gif{background:var(--surface);color:var(--accent);border:1px solid var(--accent-soft);padding:10px 18px;}
.btn.gif:hover{background:var(--accent-soft);}
.btn:disabled{opacity:.6;cursor:default;}
.preview-frame{display:flex;justify-content:center;}

#chatCard{width:380px;max-width:100%;border-radius:26px;overflow:hidden;box-shadow:0 16px 44px rgba(120,70,95,.16);
  --bg:#ffe9f1;--header-bg:#ff8db4;--header-text:#fff;--name-text:#d77ba0;
  --left-bg:#fff;--left-text:#3a2a30;--right-bg:#ff6fa0;--right-bg2:#ff8fb3;--right-text:#fff;--meta:#bd8aa0;background:var(--bg);}
.ccHeader{display:flex;align-items:center;gap:11px;padding:15px 17px;background:var(--header-bg);color:var(--header-text);}
.ccHeader .arrow{font-size:23px;line-height:1;opacity:.95;}
.ccHeader .hav{width:35px;height:35px;border-radius:50%;background:var(--av-bg);overflow:hidden;flex-shrink:0;display:none;}
.ccHeader .hav img{width:100%;height:100%;object-fit:cover;}
.ccHeader .hname{flex:1;font-size:16px;font-weight:700;}
.ccHeader .menu{letter-spacing:2px;opacity:.9;font-size:17px;}

#msgs{padding:18px 14px 22px;display:flex;flex-direction:column;gap:3px;min-height:300px;}
.msg{display:flex;gap:8px;align-items:flex-start;margin-top:10px;}
.msg.cont{margin-top:3px;}
.msg.me{flex-direction:row-reverse;}
.av{width:37px;height:37px;border-radius:50%;flex-shrink:0;overflow:hidden;background:var(--av-bg);margin-top:18px;}
.msg.cont .av{margin-top:0;}
.av img{width:100%;height:100%;object-fit:cover;}
.av.ghost{visibility:hidden;}
.bcol{display:flex;flex-direction:column;max-width:74%;gap:3px;}
.nm{font-size:11.5px;color:var(--name-text);margin:0 4px 2px;}
.bubwrap{display:flex;align-items:flex-end;gap:5px;}
.msg.me .bubwrap{flex-direction:row-reverse;}
.bub{padding:9px 13px;font-size:14px;line-height:1.45;border-radius:18px;word-break:break-word;white-space:pre-wrap;overflow-wrap:anywhere;}
.bub.pic{padding:0!important;background:transparent!important;border-radius:0!important;position:relative;}
.bub.pic::after{display:none!important;}
.bub.pic img.msgimg{display:block;width:auto;max-width:190px;max-height:250px;border-radius:15px;}
.bub.pic .del{position:absolute;top:-7px;right:-7px;width:20px;height:20px;border-radius:50%;background:rgba(20,15,18,.6);color:#fff;border:2px solid #fff;font-size:11px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.bub.slot{cursor:pointer;background:rgba(0,0,0,.035)!important;color:var(--meta)!important;border:1.5px dashed rgba(0,0,0,.14);border-radius:15px!important;padding:20px 24px!important;font-size:12px;font-weight:500;display:flex;align-items:center;justify-content:center;gap:6px;min-width:120px;}
.bub.slot::after{display:none!important;}
.bub.slot:hover{background:rgba(0,0,0,.06)!important;}
.meta{font-size:10px;color:var(--meta);white-space:nowrap;display:flex;flex-direction:column;line-height:1.3;align-items:flex-start;}
.msg.me .meta{align-items:flex-end;}
.meta .read{color:var(--right-bg);font-weight:700;}
.topdate{align-self:center;font-size:11px;margin:2px 0 12px;}
.sys{align-self:center;font-size:11px;margin:9px 0;color:var(--meta);background:rgba(0,0,0,.05);padding:5px 13px;border-radius:999px;}

.skin-kakao .bub{border-radius:15px;}
.skin-kakao .left .bub:not(.pic):not(.slot){background:var(--left-bg);color:var(--left-text);border-top-left-radius:5px;}
.skin-kakao .me .bub:not(.pic):not(.slot){background:var(--right-bg);color:var(--right-text);border-top-right-radius:5px;}
.skin-kakao .topdate span{background:rgba(120,70,90,.2);color:#fff;padding:4px 14px;border-radius:999px;}

.skin-imessage .ccHeader{flex-direction:column;gap:4px;padding:11px 16px 14px;text-align:center;}
.skin-imessage .ccHeader .arrow,.skin-imessage .ccHeader .menu{display:none;}
.skin-imessage .ccHeader .hav{display:block;width:48px;height:48px;}
.skin-imessage .ccHeader .hname{font-size:13px;}
.skin-imessage .nm,.skin-imessage .av{display:none;}
.skin-imessage .bcol{max-width:76%;}
.skin-imessage .bub{border-radius:19px;position:relative;}
.skin-imessage .left .bub:not(.pic):not(.slot){background:var(--left-bg);color:var(--left-text);border-bottom-left-radius:6px;}
.skin-imessage .me .bub:not(.pic):not(.slot){background:linear-gradient(180deg,var(--right-bg2),var(--right-bg));color:var(--right-text);border-bottom-right-radius:6px;}
.skin-imessage .left .bub:not(.pic):not(.slot)::after{content:"";position:absolute;left:-5px;bottom:0;width:13px;height:15px;background:var(--left-bg);border-bottom-right-radius:13px;z-index:-1;}
.skin-imessage .me .bub:not(.pic):not(.slot)::after{content:"";position:absolute;right:-5px;bottom:0;width:13px;height:15px;background:var(--right-bg);border-bottom-left-radius:13px;z-index:-1;}
.skin-imessage .topdate span{color:var(--meta);font-weight:600;}
.skin-imessage .meta{font-size:9.5px;}

.exporting{border-radius:0!important;box-shadow:none!important;}
.exporting .del,.exporting .pdel{display:none!important;}
.exporting .bub.slot{display:none!important;}

.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:11px 22px;border-radius:999px;font-size:13px;opacity:0;pointer-events:none;transition:.25s;z-index:99;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <h1>문자 메이커<span class="dot">.</span></h1>
    <p>OOC를 붙여넣으면 예쁜 문자창으로 — 카톡 · 아이메시지 · 사진 · PNG/GIF 저장</p>
  </div>

  <div class="layout">
    <div class="panel">
      <div class="sec">
        <div class="lab">스킨</div>
        <div class="seg" id="skinSeg">
          <button data-skin="kakao" class="on">카톡</button>
          <button data-skin="imessage">아이메시지</button>
        </div>
      </div>

      <div class="sec">
        <div class="lab">테마 <small>16</small></div>
        <div class="themes" id="themes"></div>
      </div>

      <div class="sec">
        <div class="lab">채팅방 이름 <small>자동</small></div>
        <input class="inp" id="roomName" placeholder="문자를 입력하면 자동으로 채워져요" autocomplete="off">
      </div>

      <div class="sec">
        <div class="lab">참여자 <small>프로필 클릭=사진 · ×=삭제</small></div>
        <div class="parts" id="parts"><div class="empty">문자를 붙여넣으면 자동으로 떠요</div></div>
        <button class="swapbtn" id="swapBtn" style="display:none">↔  좌우 전환</button>
      </div>

      <div class="sec">
        <div class="toggle"><span>읽음 표시</span><div class="sw-toggle" id="readToggle"></div></div>
      </div>

      <div class="sec">
        <div class="lab">문자 입력</div>
        <textarea class="ooc" id="ooc" spellcheck="false" placeholder="&lt; 발신인 / 시간 &gt;&#10;[ 메시지 내용 ]"></textarea>
        <div class="hint">
          서식 <code>&lt;b&gt;</code> <code>&lt;i&gt;</code> <code>&lt;s&gt;</code> <code>&lt;span style="font-size:20px"&gt;</code> 적용<br>
          사진은 본문에 <code>(사진)</code> 이라고 쓰면 미리보기에서 눌러 넣어요<br>
          안내문 <code>[[ 시스템 ]]</code> · 날짜는 맨 위에 한 번만 표시
        </div>
        <button class="linkbtn" id="clearBtn">전체 지우기</button>
      </div>

      <div class="sec">
        <div class="lab">OOC 양식 <small>AI에게 붙여넣기</small></div>
        <div class="oocbox" id="oocTpl"></div>
        <button class="btn copybtn" id="copyOoc">양식 복사하기</button>
      </div>
    </div>

    <div class="stage">
      <div class="stage-bar">
        <span class="ttl">미리보기</span>
        <button class="btn gif" id="gifBtn">GIF 저장</button>
        <button class="btn save" id="saveBtn">PNG 저장</button>
      </div>
      <div class="preview-frame">
        <div id="chatCard" class="skin-kakao">
          <div class="ccHeader">
            <span class="arrow">‹</span>
            <span class="hav"><img id="headerAv" alt=""></span>
            <span class="hname" id="headerName">채팅방</span>
            <span class="menu">⋮</span>
          </div>
          <div id="msgs"></div>
        </div>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

 {key:'gray',sw:'#7c8a9e',bg:'#f1f3f6',header:'#9aa6b6',name:'#76828f',kkLeft:'#fff',kkLeftT:'#2a2f36',imLeft:'#e6e8ec',imLeftT:'#1a1a1a',r1:'#7c8a9e',r2:'#97a3b3',rT:'#fff',meta:'#9aa3ad',av1:'#d3d9e1',av2:'#9aa6b6'},
 {key:'ocean',sw:'#1aa6b7',bg:'#e6f6f8',header:'#4fc1cf',name:'#2f97a4',kkLeft:'#fff',kkLeftT:'#1f343a',imLeft:'#d8ecef',imLeftT:'#1a1a1a',r1:'#1aa6b7',r2:'#48c0cf',rT:'#fff',meta:'#82aab1',av1:'#bfe8ec',av2:'#4fc1cf'},
 {key:'dark',sw:'#ff6fa0',bg:'#1d1d24',header:'#2a2a33',headerT:'#f2f2f5',name:'#9aa0ad',kkLeft:'#33333d',kkLeftT:'#f0f0f4',imLeft:'#3a3a45',imLeftT:'#f0f0f4',r1:'#ff5d9e',r2:'#ff80b3',rT:'#fff',meta:'#7d7d8a',av1:'#4a4a57',av2:'#2a2a33'},
];

const OOC_TEMPLATE=`*[OOC: 이전 RP 중지. 새로운 상황 전개. NPC와 PC 사이에 오간 일상적인 문자 기록을 출력한다. 형식은 아래를 따른다. 일상적인 대화나, 두 사람 사이의 중요한 사건이나, 다른 사람에게 보내려다 잘못 보낸 문자가 뒤섞인다. 평소 두 사람이 나눌 법한 간단한 메시지로 서술해야 한다.

< 발신인 / 시간 >
[ 메시지 내용 ]

메시지 내용에는 PC와 NPC의 감정이나 상태에 따라 HTML 형식 사용 가능. 필요할 경우 오타를 내도 괜찮으며, 최소 3,000자 이상 서술할 것.]*`;

const state={skin:'kakao',theme:'rose',showRead:false,meName:'',roomName:'',roomEdited:false,parsed:[],parts:[],avatars:{},slotPhotos:{}};
const $=s=>document.querySelector(s);
const card=$('#chatCard');

const themesBox=$('#themes');
THEMES.forEach(t=>{const d=document.createElement('div');d.className='sw'+(t.key===state.theme?' on':'');
  d.style.background=t.sw;d.dataset.key=t.key;d.title=t.key;
  d.onclick=()=>{state.theme=t.key;document.querySelectorAll('.sw').forEach(e=>e.classList.toggle('on',e.dataset.key===t.key));applyTheme();render();};
  themesBox.appendChild(d);});
function applyTheme(){const t=THEMES.find(x=>x.key===state.theme);
  const left=state.skin==='kakao'?t.kkLeft:t.imLeft,leftT=state.skin==='kakao'?t.kkLeftT:t.imLeftT;
  card.style.setProperty('--bg',t.bg);card.style.setProperty('--header-bg',t.header);
  card.style.setProperty('--header-text',t.headerT||'#fff');card.style.setProperty('--name-text',t.name);
  card.style.setProperty('--left-bg',left);card.style.setProperty('--left-text',leftT);
  card.style.setProperty('--right-bg',t.r1);card.style.setProperty('--right-bg2',t.r2);
  card.style.setProperty('--right-text',t.rT);card.style.setProperty('--meta',t.meta);
  document.documentElement.style.setProperty('--av-bg',`radial-gradient(circle at 35% 28%,${t.av1},${t.av2})`);}

$('#skinSeg').onclick=e=>{const b=e.target.closest('button');if(!b)return;state.skin=b.dataset.skin;
  document.querySelectorAll('#skinSeg button').forEach(x=>x.classList.toggle('on',x===b));
  card.className='skin-'+state.skin;applyTheme();render();};
$('#readToggle').onclick=function(){state.showRead=!state.showRead;this.classList.toggle('on',state.showRead);render();};
$('#roomName').oninput=function(){state.roomName=this.value;state.roomEdited=true;$('#headerName').textContent=this.value||'채팅방';render();};

const RE=/<\s*([^\/<>]+?)\s*\/\s*([^\/<>]+?)(?:\s*\/\s*[^<>]*?)?\s*>\s*\[([\s\S]*?)\]|===\s*([\s\S]+?)\s*===|\[\[\s*([\s\S]*?)\s*\]\]/g;
function parse(text){const out=[];let m;RE.lastIndex=0;
  while((m=RE.exec(text))){
    if(m[1]!==undefined)out.push({type:'msg',sender:m[1].trim(),time:(m[2]||'').trim(),content:m[3]});
    else if(m[4]!==undefined)out.push({type:'date',text:m[4].trim()});
    else if(m[5]!==undefined)out.push({type:'sys',text:m[5].trim()});
  }return out;}
function sanitize(h){let s=h;
  s=s.replace(/<\s*(script|style|iframe|object|embed|link|meta)[^>]*>[\s\S]*?<\s*\/\s*\1\s*>/gi,'');
  s=s.replace(/<\s*(script|style|iframe|object|embed|link|meta)[^>]*\/?>/gi,'');
  s=s.replace(/\son\w+\s*=\s*("[^"]*"|'[^']*'|[^\s>]+)/gi,'');
  s=s.replace(/javascript:/gi,'');return s;}
function buildParts(raw){const parts=[];let last=0,m;const T=/\(\s*(?:사진|이미지|image)\s*\)/gi;
  while((m=T.exec(raw))){const seg=raw.slice(last,m.index);if(seg.trim())parts.push({t:'text',v:seg});parts.push({t:'slot'});last=m.index+m[0].length;}
  const tail=raw.slice(last);if(tail.trim()||!parts.length)parts.push({t:'text',v:tail});return parts;}
const DATE_RE=/(\d{4}년\s*)?\d{1,2}월\s*\d{1,2}일(\s*[월화수목금토일]요일)?|\d{1,2}[.\/-]\d{1,2}([.\/-]\d{1,2})?/;
function clockOnly(t){const c=t.match(/((오전|오후|AM|PM|am|pm)\s*)?\d{1,2}:\d{2}/);if(c)return c[0].trim();return t.replace(DATE_RE,'').trim();}
function escapeHTML(s){return s.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

function refreshParts(){const names=[];
  state.parsed.forEach(o=>{if(o.type==='msg'&&!names.includes(o.sender))names.push(o.sender);});
  state.parts=names;
  if(!state.meName||!names.includes(state.meName))state.meName=names[1]||names[0]||'';
  if(!state.roomEdited){const other=names.find(n=>n!==state.meName)||names[0]||'';
    state.roomName=other;$('#roomName').value=other;$('#headerName').textContent=other||'채팅방';}
  const box=$('#parts');box.innerHTML='';
  $('#swapBtn').style.display=names.length===2?'block':'none';
  if(!names.length){box.innerHTML='<div class="empty">문자를 붙여넣으면 자동으로 떠요</div>';return;}
  names.forEach(n=>{const av=state.avatars[n];
    const d=document.createElement('div');d.className='part'+(n===state.meName?' isme':'');
    d.innerHTML=`<div class="pav">${av?`<img src="${av}"><span class="pdel">×</span>`:''}<span class="cam">📷</span></div>
      <span class="pname">${escapeHTML(n)}</span>
      <button class="mebtn ${n===state.meName?'on':''}">${n===state.meName?'나 ✓':'나'}</button>`;
    d.querySelector('.pav').onclick=()=>pickAvatar(n);
    const pd=d.querySelector('.pdel');if(pd)pd.onclick=ev=>{ev.stopPropagation();delete state.avatars[n];refreshParts();render();};
    d.querySelector('.mebtn').onclick=()=>setMe(n);
    box.appendChild(d);});}
function setMe(n){state.meName=n;
  if(!state.roomEdited){const o=state.parts.find(x=>x!==n)||n;state.roomName=o;$('#roomName').value=o;$('#headerName').textContent=o||'채팅방';}
  refreshParts();render();}
$('#swapBtn').onclick=()=>{if(state.parts.length!==2)return;const o=state.parts.find(n=>n!==state.meName);if(o)setMe(o);};
function pickAvatar(name){const inp=document.createElement('input');inp.type='file';inp.accept='image/*';
  inp.onchange=()=>{const f=inp.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{state.avatars[name]=r.result;refreshParts();render();};r.readAsDataURL(f);};inp.click();}
function pickSlot(idx){const inp=document.createElement('input');inp.type='file';inp.accept='image/*';
  inp.onchange=()=>{const f=inp.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{state.slotPhotos[idx]=r.result;render();};r.readAsDataURL(f);};inp.click();}

function render(limit){
  if(limit===undefined)limit=null;
  const partner=state.parts.find(n=>n===state.roomName)||state.parts.find(n=>n!==state.meName)||state.parts[0];
  const hAv=partner&&state.avatars[partner];
  const himg=$('#headerAv');
  if(hAv){himg.src=hAv;himg.style.display='';}
  else{himg.removeAttribute('src');himg.style.display='none';}
  himg.parentElement.style.visibility=(state.skin==='imessage'||hAv)?'visible':'hidden';

  const box=$('#msgs');box.innerHTML='';

  let topDate='';
  const firstDiv=state.parsed.find(o=>o.type==='date');
  if(firstDiv)topDate=firstDiv.text;
  else{for(const o of state.parsed){if(o.type==='msg'){const dm=o.time.match(DATE_RE);if(dm){topDate=dm[0];break;}}}}
  if(topDate){const d=document.createElement('div');d.className='topdate';d.innerHTML=`<span>${escapeHTML(topDate)}</span>`;box.appendChild(d);}

  let prevSender=null,prevType=null,slotCounter=0,shown=0;
  for(const o of state.parsed){
    if(o.type==='date'){prevType='date';prevSender=null;continue;}
    if(limit!=null&&shown>=limit)break;
    if(o.type==='sys'){const d=document.createElement('div');d.className='sys';d.textContent=o.text;box.appendChild(d);prevSender=null;prevType='sys';shown++;continue;}

    const isMe=o.sender===state.meName;
    const cont=prevType==='msg'&&prevSender===o.sender;
    const row=document.createElement('div');row.className='msg '+(isMe?'me':'left')+(cont?' cont':'');
    const av=document.createElement('div');av.className='av'+(cont?' ghost':'');
    if(!isMe){const a=state.avatars[o.sender];if(a)av.innerHTML=`<img src="${a}">`;}
    const col=document.createElement('div');col.className='bcol';
    if(!isMe&&!cont){const nm=document.createElement('div');nm.className='nm';nm.textContent=o.sender;col.appendChild(nm);}

    const bubbles=[];
    buildParts(o.content).forEach(pt=>{
      if(pt.t==='slot'){
        const idx=slotCounter++;const url=state.slotPhotos[idx];
        const b=document.createElement('div');
        if(url){b.className='bub pic';b.innerHTML=`<img class="msgimg" src="${url}" alt=""><div class="del" data-del="${idx}">×</div>`;}
        else{b.className='bub slot';b.dataset.slot=idx;b.innerHTML='📷 사진 추가';}
        bubbles.push(b);
      } else {
        const clean=sanitize(pt.v).trim();
        if(clean.replace(/<[^>]+>/g,'').trim()!==''||/<img|<br/i.test(clean)){const b=document.createElement('div');b.className='bub';b.innerHTML=clean;bubbles.push(b);}
      }
    });
    if(!bubbles.length){const b=document.createElement('div');b.className='bub';bubbles.push(b);}

    bubbles.forEach((b,bi)=>{const wrap=document.createElement('div');wrap.className='bubwrap';wrap.appendChild(b);
      if(bi===bubbles.length-1){const meta=document.createElement('div');meta.className='meta';
        const readMark=(state.showRead&&isMe)?'<span class="read">읽음</span>':'';
        const tt=clockOnly(o.time);
        meta.innerHTML=readMark+(tt?`<span>${escapeHTML(tt)}</span>`:'');
        if(readMark||tt)wrap.appendChild(meta);}
      col.appendChild(wrap);});

    row.appendChild(av);row.appendChild(col);box.appendChild(row);
    prevSender=o.sender;prevType='msg';shown++;
  }

  box.querySelectorAll('.bub.slot').forEach(el=>el.onclick=()=>pickSlot(parseInt(el.dataset.slot)));
  box.querySelectorAll('.bub.pic .del').forEach(el=>el.onclick=ev=>{ev.stopPropagation();delete state.slotPhotos[parseInt(el.dataset.del)];render();});

  if(!state.parsed.length)box.innerHTML='<div class="sys" style="margin:90px auto;">문자를 입력하면 여기에 나와요</div>';
}

let deb;
$('#ooc').oninput=function(){clearTimeout(deb);const v=this.value;deb=setTimeout(()=>{state.parsed=parse(v);refreshParts();render();},110);};
$('#clearBtn').onclick=()=>{$('#ooc').value='';state.parsed=[];state.roomEdited=false;state.meName='';state.slotPhotos={};refreshParts();render();};

$('#oocTpl').textContent=OOC_TEMPLATE;
$('#copyOoc').onclick=()=>{navigator.clipboard.writeText(OOC_TEMPLATE).then(()=>toast('OOC 양식 복사 완료'),()=>toast('복사 실패'));};

function themeBg(){const t=THEMES.find(x=>x.key===state.theme);return t?t.bg:'#ffffff';}
let FONT_CSS=null;
async function snapCanvas(scale,fontCss){
  if(window.htmlToImage&&htmlToImage.toCanvas){
    const opt={pixelRatio:scale,cacheBust:true,backgroundColor:themeBg()};
    if(fontCss)opt.fontEmbedCSS=fontCss;
    return await htmlToImage.toCanvas(card,opt);
  }
  const W=card.offsetWidth,H=card.offsetHeight;
  return await html2canvas(card,{scale,backgroundColor:themeBg(),useCORS:true,logging:false,width:W,height:H,windowWidth:W});
}

$('#saveBtn').onclick=async function(){this.textContent='저장 중…';this.disabled=true;
  card.classList.add('exporting');
  try{if(document.fonts&&document.fonts.ready)await document.fonts.ready;
    const c=await snapCanvas(2);
    card.classList.remove('exporting');
    const a=document.createElement('a');a.download=(state.roomName||'문자')+'.png';a.href=c.toDataURL('image/png');a.click();toast('저장 완료');
  }catch(e){console.error(e);
    try{const W=card.offsetWidth,H=card.offsetHeight;
      const c=await html2canvas(card,{scale:2,backgroundColor:themeBg(),useCORS:true,logging:false,width:W,height:H,windowWidth:W});
      card.classList.remove('exporting');
      const a=document.createElement('a');a.download=(state.roomName||'문자')+'.png';a.href=c.toDataURL('image/png');a.click();toast('저장 완료');
    }catch(e2){card.classList.remove('exporting');toast('저장 실패');console.error(e2);}
  }
  this.textContent='PNG 저장';this.disabled=false;};

let gifWorkerURL=null;
async function ensureWorker(){if(gifWorkerURL)return gifWorkerURL;
  const r=await fetch('https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.worker.js');
  gifWorkerURL=URL.createObjectURL(new Blob([await r.text()],{type:'application/javascript'}));return gifWorkerURL;}

$('#gifBtn').onclick=async function(){
  const steps=state.parsed.filter(o=>o.type!=='date').length;
  if(!steps){toast('문자를 먼저 입력해 주세요');return;}
  const btn=this;btn.disabled=true;$('#saveBtn').disabled=true;btn.textContent='준비 중…';
  try{
    if(document.fonts&&document.fonts.ready)await document.fonts.ready;
    const worker=await ensureWorker();
    render(null);
    const W=card.offsetWidth,H=card.offsetHeight,scale=2;
    card.style.height=H+'px';card.classList.add('exporting');
    if(window.htmlToImage&&htmlToImage.getFontEmbedCSS){try{FONT_CSS=FONT_CSS||await htmlToImage.getFontEmbedCSS(card);}catch(e){FONT_CSS=null;}}
    const gif=new GIF({workers:2,quality:10,width:Math.round(W*scale),height:Math.round(H*scale),workerScript:worker,background:'#ffffff'});
    const maxFrames=40,inc=Math.max(1,Math.ceil(steps/maxFrames));
    for(let shown=inc;;shown+=inc){
      const i=Math.min(shown,steps);
      render(i);
      const c=await snapCanvas(scale,FONT_CSS);
      gif.addFrame(c,{delay:i>=steps?2000:650,copy:true});
      btn.textContent=`캡처 ${i}/${steps}`;
      if(i>=steps)break;
    }
    card.style.height='';card.classList.remove('exporting');render(null);
    gif.on('progress',p=>{btn.textContent=`GIF ${Math.round(p*100)}%`;});
    gif.on('finished',blob=>{const a=document.createElement('a');a.download=(state.roomName||'문자')+'.gif';a.href=URL.createObjectURL(blob);a.click();toast('GIF 저장 완료');btn.textContent='GIF 저장';btn.disabled=false;$('#saveBtn').disabled=false;});
    gif.render();
  }catch(e){console.error(e);card.style.height='';card.classList.remove('exporting');render(null);toast('GIF 저장 실패 — 새로고침 후 다시 시도');btn.textContent='GIF 저장';btn.disabled=false;$('#saveBtn').disabled=false;}
};

let tt;function toast(msg){const el=$('#toast');el.textContent=msg;el.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>el.classList.remove('show'),1700);}

applyTheme();refreshParts();render();
</script>
</body>
